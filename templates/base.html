<!-- templates/base.html -->
<!DOCTYPE html>
<html>
<head>
    <title>Fitness Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    {% if user.is_authenticated %}
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="{% url 'dashboard' %}">Fitness Tracker</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'dashboard' %}">Dashboard</a>
                    </li>
                </ul>

                {% if user_profile.profile_picture %}
                    <a class="nav-link" href="{% url 'profile_detail' %}"><img src="{{ user_profile.profile_picture.url }}" alt="Foto Profilo" class="rounded-circle me-3" style="width: 48px; height: 48px; object-fit: cover;"></a>
                {% else %}
                    <a class="nav-link" href="{% url 'profile_detail' %}">
                        <div class="rounded-circle bg-secondary text-white d-flex align-items-center justify-content-center me-3 fw-bold shadow-sm" style="width: 48px; height: 48px; font-size: 24px;">
                            {{ user_profile.name|slice:":1" }}{{ user_profile.last_name|slice:":1" }}
                        </div>
                    </a>
                {% endif %}
                <a class="nav-link" href="{% url 'profile_detail' %}"><span class="navbar-text me-3 text-light">{{ user.username }}</span></a>
                <a class="btn btn-outline-light" href="{% url 'logout' %}">Logout</a>
            </div>
        </div>
    </nav>
    {% else %}
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand">Fitness Tracker</a>
        </div>
    </nav>
    {% endif %}

    <div class="container mt-4">
        {% block content %}
        
        {% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4" crossorigin="anonymous"></script>

</body>
</html>
