{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <h1>Register</h1>
            
            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="btn btn-primary">Register</button>
                <a href="{% url 'login' %}" class="btn btn-secondary">Login</a>
            </form>
        </div>
    </div>
</div>

{% endblock %}
