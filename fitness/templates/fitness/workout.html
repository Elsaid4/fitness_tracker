{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">    
    <div class="row justify-content-center mt-4">
        <div class="col-md-8">
            <h2>{{ workout.name }}</h2>
            
            <form method="POST" action="{% url 'save_workout' workout.id %}">
                {% csrf_token %}
                
                <div id="sets-container">
                    {% for e in exercises %}
                        <div class="row g-2 mb-2 set-row">
                            <div class="col">
                                <select name="exercise_name[]" class="form-control" required>
                                    <option value="">Seleziona Esercizio</option>
                                    {% for ex in all_exercises %}
                                        <option value="{{ ex.name }}" {% if ex.name == e.name %}selected{% endif %}>{{ ex.name }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                            {% for s in e.sets.all %}
                                <div class="col">
                                    <p>{{ s.repetitions }}</p>
                                </div>
                                <div class="col">
                                    <p>{{ s.weight }}</p>
                                </div>
                            {% endfor %}
                        </div>
                    {% endfor %}
                </div>

                <div class="mt-3">
                    <button type="button" class="btn btn-outline-primary" id="add-exercise-btn">+ Aggiungi Esercizio</button>
                </div>

                <hr>
                
                <div class="d-flex justify-content-between">
                    <a href="{% url 'dashboard' %}" class="btn btn-secondary">Annulla</a>
                    <button type="submit" class="btn btn-success">Salva Workout</button>
                </div>
            </form>
        </div>
    </div>  
</div>

<script>
    document.querySelector('#add-exercise-btn').addEventListener('click', function() {
        const container = document.getElementById('sets-container');
        
        // Generiamo una riga vuota con i campi di input pronti da compilare
        // Usiamo le parentesi quadre [] nel name così Django riceverà una lista di valori
        const newRowHtml = `
            <div class="row g-2 mb-2 set-row">
                <div class="col">
                    <select name="exercise_name[]" class="form-control" required>
                        <option value="">Seleziona Esercizio</option>
                        {% for ex in all_exercises %}
                            <option value="{{ ex.name }}">{{ ex.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                {% for s in e.sets.all %}
                    <div class="col">
                        <p>{{ s.repetitions }}</p>
                    </div>
                    <div class="col">
                        <p>{{ s.weight }}</p>
                    </div>
                {% endfor %}
                <button type="button" class="btn btn-outline-danger add-set-btn"> Aggiungi set</button>
            </div>
        `;
        
        // Inserisce la riga vuota nel contenitore
        container.insertAdjacentHTML('beforeend', newRowHtml);
    });

    document.addEventListener('click', function(e) {
        if (e.target.classList.contains('add-set-btn')) {
            const setRow = e.target.closest('.set-row');
            const newSetHtml = `
                <div class="row">
                    <div class="col">
                        <input type="number" name="repetitions[]" class="form-control" placeholder="Ripetizioni" required>
                    </div>
                    <div class="col">
                        <input type="number" name="weight[]" class="form-control" placeholder="Peso (kg)" required>
                    </div>
                </div>
            `;
            setRow.insertAdjacentHTML('beforeend', newSetHtml);
        }
    });
</script>
{% endblock %}
