{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">    
    <div class="row justify-content-center mt-4">
        <div class="col-md-8">
            <h2>{{ workout.name }}</h2>
            
            <form method="POST" action="{% url 'save_workout' workout.name %}">
                {% csrf_token %}
                
                <div id="sets-container">

                </div>

                <div class="mt-3">
                    <button type="button" class="btn btn-outline-primary" id="add-exercise-btn">+ Aggiungi Esercizio</button>
                </div>

                <hr>
                
                <div class="d-flex justify-content-between">
                    <a href="{% url 'dashboard' %}" class="btn btn-secondary">Annulla</a>
                    <button type="submit" class="btn btn-success">Salva Workout</button>
                </div>
            </form>
        </div>
    </div>  
</div>

<script>
    let exerciseCounter = 0; // Contatore globale per rendere ogni esercizio unico

    document.querySelector('#add-exercise-btn').addEventListener('click', function() {
        exerciseCounter++;
        const container = document.getElementById('sets-container');
        
        // Creiamo un blocco esercizio con un ID basato sul counter
        const newExerciseBlock = document.createElement('div');
        newExerciseBlock.className = 'exercise-block border p-3 mb-3';
        newExerciseBlock.innerHTML = `
            <div class="row mb-2">
                <div class="col">
                    <select name="exercise_${exerciseCounter}_name" class="form-control" required>
                        <option value="">Seleziona Esercizio</option>
                        {% for ex in all_exercises %}
                            <option value="{{ ex.name }}">{{ ex.name }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            <div class="sets-list">
                </div>
            <button type="button" class="btn btn-outline-danger add-set-btn" data-ex-id="${exerciseCounter}">+ Aggiungi Set</button>
        `;
        container.appendChild(newExerciseBlock);
    });

    document.addEventListener('click', function(e) {
        if (e.target.classList.contains('add-set-btn')) {
            const exId = e.target.getAttribute('data-ex-id');
            const setsList = e.target.closest('.exercise-block').querySelector('.sets-list');
            
            const newSetDiv = document.createElement('div');
            newSetDiv.className = 'row mt-1';
            // Usiamo lo stesso exId nei nomi degli input
            newSetDiv.innerHTML = `
                <div class="col">
                    <input type="number" name="exercise_${exId}_reps[]" class="form-control" placeholder="Ripetizioni" required>
                </div>
                <div class="col">
                    <input type="number" name="exercise_${exId}_weight[]" class="form-control" placeholder="Peso (kg)" required>
                </div>
                <div class="col-1">
                <input type="checkbox" class="btn-check" id="check-${Date.now()}" name="completed[]" autocomplete="off">
                    <label class="btn btn-outline-success" for="check-${Date.now()}">✓</label>
                </div>
            `;
            setsList.appendChild(newSetDiv);
        }
    });
</script>
{% endblock %}
